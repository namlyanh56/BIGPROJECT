<script>
const { useState, useEffect, useRef, createElement: h } = React;

const ICON_FALLBACKS = { SmartphoneNfc: 'Smartphone' };
const DEFAULT_FALLBACK_ICON = 'Circle';
const warnedMissingIcons = new Set();

const warnMissingIcon = (name, fallbackName) => {
  const key = `${name}|${fallbackName || 'none'}`;
  if (warnedMissingIcons.has(key)) return;
  warnedMissingIcons.add(key);
  console.warn(`[lucide] Icon "${name}" tidak ditemukan.${fallbackName ? ` Menggunakan fallback "${fallbackName}".` : ''}`);
};

const resolveIconName = (name) => {
  if (lucide[name]) return name;
  const mappedName = ICON_FALLBACKS[name];
  if (mappedName && lucide[mappedName]) {
    warnMissingIcon(name, mappedName);
    return mappedName;
  }
  if (lucide[DEFAULT_FALLBACK_ICON]) {
    warnMissingIcon(name, DEFAULT_FALLBACK_ICON);
    return DEFAULT_FALLBACK_ICON;
  }
  warnMissingIcon(name);
  return null;
};

const renderIconChildren = (nodes, keyPrefix = 'icon') => {
  if (!Array.isArray(nodes)) return [];
  return nodes.flatMap((node, index) => {
    if (node == null || node === false) return [];
    if (typeof node === 'string' || typeof node === 'number') return [node];
    if (!Array.isArray(node)) return [];
    if (typeof node[0] !== 'string') return renderIconChildren(node, `${keyPrefix}-${index}`);
    const [tagName, attrs = {}, ...children] = node;
    return [
      h(tagName, { key: `${keyPrefix}-${index}`, ...(attrs || {}) }, ...renderIconChildren(children, `${keyPrefix}-${index}`))
    ];
  });
};

const validateUsedLucideIcons = () => {
  const source = document.currentScript?.textContent || '';
  const usedIcons = new Set();
  const patterns = [
    /ic\(\s*['"`]([A-Za-z0-9]+)['"`]/g,
    /iconName\s*:\s*['"`]([A-Za-z0-9]+)['"`]/g
  ];
  patterns.forEach((pattern) => {
    for (const match of source.matchAll(pattern)) usedIcons.add(match[1]);
  });
  usedIcons.forEach((iconName) => resolveIconName(iconName));
};

const ic = (name, size = 16, extraStyle = {}) => {
  const resolvedName = resolveIconName(name);
  if (!resolvedName) return null;
  const icon = lucide[resolvedName];
  if (!Array.isArray(icon)) return null;
  const [, attrs = {}, ...children] = icon;
  const svgAttrs = {
    fill: 'none',
    stroke: 'currentColor',
    strokeWidth: 1.75,
    strokeLinecap: 'round',
    strokeLinejoin: 'round',
    ...attrs,
    width: size,
    height: size,
    style: {
      display: 'inline-block',
      verticalAlign: 'middle',
      flexShrink: 0,
      ...(attrs.style || {}),
      ...extraStyle
    }
  };
  return h('svg', svgAttrs, ...renderIconChildren(children));
};

validateUsedLucideIcons();

        h('span', {className:'profile-section-badge'}, 'Min. 6 karakter')
      ),
      h('div', {className:'profile-grid', style:{gridTemplateColumns:'1fr 1fr 1fr',marginTop:13}},
        ...['Password Saat Ini','Password Baru','Konfirmasi'].map((label,i)=>
          h('div', {key:i},
            h('div', {style:{fontSize:11,color:'#aaa',marginBottom:4}}, label),
            h('input', {className:'input-field no-icon', type:'password', defaultValue:'••••••••', style:{fontSize:12,padding:'9px 11px'}})
          )
        )
      ),
      h('button', {className:'btn-primary', style:{marginTop:14,background:'#F59E0B'}},
        ic('RefreshCw', 15), ' Ubah Password'
      )
    ),
    h('div', {className:'profile-section'},
      h('div', {className:'profile-section-title'},
        ic('Bell', 16, {color:PURPLE}), ' Notifikasi',
        h('span', {className:'profile-section-badge'}, 'Telegram')
      ),
      h('div', {style:{marginTop:13}},
        h('div', {style:{fontSize:12,color:'#555',marginBottom:7}}, 'Telegram Chat Id'),
        h('input', {className:'input-field no-icon', placeholder:'contoh: 123456789', value:chatId, onChange:e=>setChatId(e.target.value)}),
        h('div', {style:{fontSize:11,color:PURPLE,marginTop:7,display:'flex',alignItems:'center',gap:5}},
          ic('Info', 13), ' Pastikan chat id benar agar notifikasi masuk ke Telegram kamu.'
        )
      ),
      h('button', {className:'btn-primary', style:{marginTop:14}},
        ic('BellRing', 15), ' Update Notifikasi'
      )
    )
  );
}

function App() {
  const [screen, setScreen] = useState("login");
  const [activePage, setActivePage] = useState("dashboard");
  const [showQRModal, setShowQRModal] = useState(false);
  const [qrType, setQrType] = useState("qr");
  const [showWalletMenu, setShowWalletMenu] = useState(false);
  const [toast, setToast] = useState(null);

  if (screen === 'login') return h('div', null,
    h('style', null, css),
    h(LoginPage, {onLogin:()=>setScreen('app'), onRegister:()=>setScreen('register')})
  );
  if (screen === 'register') return h('div', null,
    h('style', null, css),
    h(RegisterPage, {onBack:()=>setScreen('login')})
  );

  const renderPage = () => {
    if (activePage==='dashboard') return h(DashboardPage);
    if (activePage==='devices') return h(DevicesPage, {onScanQR:()=>{setQrType('qr');setShowQRModal(true)}, onPairing:()=>{setQrType('pairing');setShowQRModal(true)}});
    if (activePage==='withdraw') return h(WithdrawPage);
    if (activePage==='referrals') return h(ReferralsPage);
    if (activePage==='profile') return h(ProfilePage);
  };

  const navItems = [
    {id:'dashboard', iconName:'LayoutDashboard', label:'Dashboard'},
    {id:'devices', iconName:'Smartphone', label:'Devices'},
    {id:'wallet-center', iconName:null, label:null},
    {id:'referrals', iconName:'Users', label:'Referrals'},
    {id:'profile', iconName:'UserCircle', label:'Profile'},
  ];

  return h('div', null,
    h('style', null, css),
    h('div', {className:'app'},
      h('div', {className:'topbar'},
        h('div', {style:{display:'flex',alignItems:'center',gap:9}},
          h('div', {className:'topbar-icon'}, ic('Phone', 18)),
          h('div', null,
            h('span', {className:'topbar-title'}, 'PinjemWA'),
            h('span', {className:'topbar-sub'}, 'Panel')
          )
        ),
        h('button', {className:'logout-btn', onClick:()=>setScreen('login')},
          ic('LogOut', 15), ' Logout'
        )
      ),
      h('div', {className:'page', style:{flex:1,overflowY:'auto'}}, renderPage()),
      h('div', {className:'bottom-nav'},
        navItems.map(item => {
          if (item.id==='wallet-center') {
            return h('button', {key:'wallet', className:'nav-item', onClick:()=>setShowWalletMenu(!showWalletMenu)},
              h('div', {className:'nav-wallet'}, ic('CreditCard', 22, {color:'white'})),
              h('span', {style:{marginTop:5,color:PURPLE,fontWeight:700,fontSize:11}}, 'Wallets')
            );
          }
          const isActive = activePage === item.id;
          return h('button', {key:item.id, className:`nav-item ${isActive?'active':''}`, onClick:()=>setActivePage(item.id)},
            ic(item.iconName, 22),
            h('span', null, item.label)
          );
        })
      ),
      showWalletMenu && h(WalletPopup, {onClose:()=>setShowWalletMenu(false), onWithdraw:()=>setActivePage('withdraw')}),
      showQRModal && h(QRModal, {type:qrType, onClose:()=>setShowQRModal(false)}),
      toast && h('div', {className:'toast'}, toast)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
